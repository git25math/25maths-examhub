<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5248C9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>25Maths Exam Support Hub</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">

  <!-- Resource hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://jjjigohjvmyewasmmmyf.supabase.co">

  <!-- Fonts (Noto Sans SC loaded conditionally by config.js for non-EN users) -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="css/style.min.css?v=5.19.0">
  <script>(function(){try{if(localStorage.getItem('wmatch_dark')==='1'||(localStorage.getItem('wmatch_dark')===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark')}}catch(e){}})()</script>
  <script>(function(){try{var ts=localStorage.getItem('wmatch_login_ts');if(ts&&(Date.now()-parseInt(ts,10))<300000){var s=document.createElement('style');s.id='auth-hide-style';s.textContent='#ov-auth{display:none}';document.head.appendChild(s);/* Watchdog: if app doesn't init within 8s, show auth */setTimeout(function(){var ov=document.getElementById('ov-auth');if(ov&&ov.style.display==='none'&&!document.getElementById('panel-home').children.length){try{localStorage.removeItem('wmatch_login_ts')}catch(e){}ov.style.display='';ov.classList.add('vis')}},8000)}}catch(e){}})()</script>
</head>
<body>

<!-- Particle Canvas -->
<canvas id="fx" aria-hidden="true"></canvas>

<!-- Auth Overlay -->
<div class="ov vis" id="ov-auth">
  <div class="auth-card">
    <button class="auth-lang-toggle" id="auth-lang-toggle" onclick="toggleAuthLang()">中文</button>
    <div class="auth-logo">25</div>
    <div class="auth-title">25Maths Exam Hub</div>
    <div class="auth-sub" data-en="IGCSE Math Learning Platform" data-zh="IGCSE 数学学习平台">IGCSE Math Learning Platform</div>
    <form id="auth-form" autocomplete="on" onsubmit="return false">
      <input class="auth-input" id="auth-email" type="email" placeholder="Email" aria-label="Email" autocomplete="username">
      <input class="auth-input" id="auth-pass" type="password" placeholder="Password (min 6 chars)" aria-label="Password" autocomplete="current-password">
      <input class="auth-input" id="auth-invite" type="text" placeholder="Invite code, e.g. MATH2026-A" aria-label="Invite Code" autocomplete="off" style="display:none">
      <div class="auth-err" id="auth-err"></div>
      <div class="auth-btn-row">
        <button class="btn btn-primary btn-block" id="auth-login" type="submit" data-en="Login" data-zh="登录">Login</button>
        <button class="btn btn-outline btn-block" id="auth-register" type="button" data-en="Register" data-zh="注册">Register</button>
      </div>
    </form>
    <button class="btn btn-ghost btn-block" id="auth-skip" data-en="Try without login" data-zh="先不登录，直接体验">Try without login</button>
    <div class="text-center"><a class="auth-forgot" onclick="showPasswordReset()" data-en="Forgot password?" data-zh="忘记密码？">Forgot password?</a></div>
    <div class="auth-note" data-en="Login to sync across devices" data-zh="登录后可跨设备同步进度">Login to sync across devices</div>
    <div class="auth-divider"><span>OR</span></div>
    <button class="btn btn-ghost btn-block btn-sm" id="auth-teacher-toggle" onclick="toggleTeacherReg()"><span data-en="👩‍🏫 Teacher Registration" data-zh="👩‍🏫 教师注册">👩‍🏫 Teacher Registration</span></button>
    <form id="teacher-reg" style="display:none" autocomplete="on" onsubmit="doTeacherRegister(); return false">
      <input class="auth-input" id="tr-name" type="text" placeholder="Name" aria-label="Name" autocomplete="name">
      <input class="auth-input" id="tr-email" type="email" placeholder="Email" aria-label="Email" autocomplete="username">
      <input class="auth-input" id="tr-pass" type="password" placeholder="Password (min 6)" aria-label="Password" autocomplete="new-password">
      <input class="auth-input" id="tr-code" type="text" placeholder="School Code" aria-label="School Code" autocomplete="off">
      <div class="auth-err" id="tr-err"></div>
      <button class="btn btn-primary btn-block" id="tr-submit" type="submit" data-en="Register Teacher Account" data-zh="注册教师账号">Register Teacher Account</button>
    </form>
  </div>
</div>

<!-- Board Selection Overlay -->
<div class="ov" id="ov-board">
  <div class="auth-card" style="max-width:440px">
    <div class="auth-logo">25</div>
    <div class="auth-title" id="board-sel-title">选择你的课程</div>
    <div class="auth-sub" id="board-sel-sub">选课后只显示对应模块的内容，可在设置中更换</div>
    <div id="board-sel-list"></div>
  </div>
</div>

<!-- App Shell -->
<div id="app-shell" class="shell" style="display:none">

  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">25</div>
      <div>
        <div class="brand-name">25Maths</div>
        <div class="brand-sub">Exam Support Hub</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item active" data-panel="home" onclick="navTo('home')">
        <span class="nav-icon">🏠</span><span class="nav-label" data-en="Home" data-zh="首页">首页</span>
      </button>
      <button class="nav-item" data-panel="plan" onclick="navTo('plan')">
        <span class="nav-icon">📋</span><span class="nav-label" data-en="Today's Plan" data-zh="今日计划">今日计划</span>
        <span class="nav-badge" id="nav-plan-badge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-panel="mistakes" onclick="navTo('mistakes')">
        <span class="nav-icon">📕</span><span class="nav-label" data-en="Mistake Book" data-zh="错题本">错题本</span>
        <span class="nav-badge" id="nav-mk-badge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-panel="lists" onclick="navTo('lists')">
        <span class="nav-icon">📋</span><span class="nav-label" data-en="Learning Items" data-zh="学习项目">学习项目</span>
      </button>

      <div class="sidebar-sep"></div>
      <div class="sidebar-group-label" data-en="TOOLS" data-zh="工具">TOOLS</div>

      <button class="nav-item" data-panel="stats" onclick="navTo('stats')">
        <span class="nav-icon">📊</span><span class="nav-label" data-en="Stats" data-zh="统计">统计</span>
      </button>
      <button class="nav-item" data-panel="homework" id="nav-homework" style="display:none" onclick="navTo('homework')">
        <span class="nav-icon">📝</span><span class="nav-label" data-en="Homework" data-zh="作业">作业</span>
      </button>
      <button class="nav-item" data-panel="admin" id="nav-admin" style="display:none" onclick="navTo('admin')">
        <span class="nav-icon">👩‍🏫</span><span class="nav-label" data-en="Admin" data-zh="管理">管理</span>
      </button>

      <div class="sidebar-sep"></div>
    </nav>

    <div class="sidebar-notif" id="sidebar-notif" style="display:none">
      <button class="nav-item notif-bell" onclick="showNotifPanel()">
        <span class="nav-icon">🔔</span><span class="nav-label" data-en="Notifications" data-zh="通知">通知</span>
        <span class="notif-badge" id="notif-badge-sb">0</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <button class="sf-trigger" id="sf-trigger" onclick="toggleUserMenu()" aria-expanded="false" aria-haspopup="menu">
        <span class="sf-avatar" id="sb-rank"></span>
        <span class="sf-name" id="sb-name"></span>
      </button>
      <div class="sf-menu" id="sf-menu" role="menu">
        <div class="sf-menu-header" id="sf-menu-header"></div>
        <div class="sf-divider"></div>
        <button class="sf-menu-item" role="menuitem" onclick="showSettings(); toggleUserMenu()">
          <span class="sf-icon">⚙</span><span data-en="Settings" data-zh="设置">设置</span>
        </button>
        <button class="sf-menu-item" role="menuitem" id="dark-toggle-sb" onclick="toggleDark()">
          <span class="sf-icon">🌙</span><span data-en="Dark Mode" data-zh="深色模式">深色模式</span>
        </button>
        <button class="sf-menu-item" role="menuitem" id="sound-toggle-sb" onclick="toggleSound()">
          <span class="sf-icon">🔊</span><span data-en="Sound" data-zh="音效">音效</span>
        </button>
        <button class="sf-menu-item" role="menuitem" id="lang-toggle-sb" onclick="toggleLang()">
          <span class="sf-icon">🌐</span><span data-en="Language" data-zh="语言">语言</span>
        </button>
        <button class="sf-menu-item" role="menuitem" onclick="showBugReport(); toggleUserMenu()">
          <span class="sf-icon">🐛</span><span data-en="Report Bug" data-zh="报告问题">报告问题</span>
        </button>
        <div class="sf-divider"></div>
        <div class="sf-menu-sync" id="sb-sync-status"></div>
        <div class="sf-divider"></div>
        <button class="sf-menu-item sf-danger" role="menuitem" id="btn-logout-sb">
          <span class="sf-icon">↩</span><span data-en="Log out" data-zh="退出登录">退出登录</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="content">
    <!-- Mobile/Tablet Header -->
    <header class="header-bar" id="header-bar">
      <div class="header-left">
        <div class="header-brand">25Maths</div>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="dark-toggle-hb" onclick="toggleDark()" aria-label="Toggle dark mode">🌙</button>
        <button class="btn-icon" id="sound-toggle-hb" onclick="toggleSound()" aria-label="Toggle sound">🔊</button>
        <button class="btn-icon" id="lang-toggle-hb" onclick="toggleLang()" aria-label="Toggle language">中文</button>
        <div class="header-user">
          <span id="hb-rank"></span>
          <span id="hb-name"></span>
        </div>
        <button class="btn-icon notif-bell" id="notif-bell-hb" style="display:none" onclick="showNotifPanel()" title="通知">🔔<span class="notif-badge" id="notif-badge-hb">0</span></button>
        <button class="btn-icon" onclick="showSettings()" title="设置" aria-label="Settings">⚙</button>
        <button class="btn-icon" id="btn-logout-hb" title="退出" aria-label="Log out">↩</button>
      </div>
    </header>

    <!-- Panels -->
    <div class="main-pad">
      <div class="panel active" id="panel-home"></div>
      <div class="panel" id="panel-deck"></div>
      <div class="panel" id="panel-study"></div>
      <div class="panel" id="panel-battle"></div>
      <div class="panel" id="panel-review-dash"></div>
      <div class="panel" id="panel-review"></div>
      <div class="panel" id="panel-import"></div>
      <div class="panel" id="panel-plan"></div>
      <div class="panel" id="panel-mistakes"></div>
      <div class="panel" id="panel-board"></div>
      <div class="panel" id="panel-quiz"></div>
      <div class="panel" id="panel-spell"></div>
      <div class="panel" id="panel-match"></div>
      <div class="panel" id="panel-preview"></div>
      <div class="panel" id="panel-daily"></div>
      <div class="panel" id="panel-practice"></div>
      <div class="panel" id="panel-pastpaper"></div>
      <div class="panel" id="panel-papers"></div>
      <div class="panel" id="panel-section"></div>
      <div class="panel" id="panel-kp"></div>
      <div class="panel" id="panel-stats"></div>
      <div class="panel" id="panel-admin"></div>
      <div class="panel" id="panel-homework"></div>
      <div class="panel" id="panel-lists"></div>
    </div>
  </div>

  <!-- Mobile/Tablet Bottom Nav -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bnav-item active" data-panel="home" onclick="navTo('home')">
      <span class="bnav-icon">🏠</span><span class="bnav-label" data-en="Home" data-zh="首页">首页</span>
    </button>
    <button class="bnav-item" data-panel="plan" onclick="navTo('plan')">
      <span class="bnav-icon">📋</span><span class="bnav-label" data-en="Plan" data-zh="计划">计划</span>
      <span class="bnav-badge" id="bnav-plan-badge" style="display:none">0</span>
    </button>
    <button class="bnav-item" data-panel="mistakes" onclick="navTo('mistakes')">
      <span class="bnav-icon">📕</span><span class="bnav-label" data-en="Mistakes" data-zh="错题">错题</span>
      <span class="bnav-badge" id="bnav-mk-badge" style="display:none">0</span>
    </button>
    <button class="bnav-item" data-panel="lists" onclick="navTo('lists')">
      <span class="bnav-icon">📋</span><span class="bnav-label" data-en="Items" data-zh="项目">项目</span>
    </button>
    <button class="bnav-item" data-panel="stats" onclick="navTo('stats')">
      <span class="bnav-icon">📊</span><span class="bnav-label" data-en="Stats" data-zh="统计">统计</span>
    </button>
    <button class="bnav-item" data-panel="homework" id="bnav-homework" style="display:none" onclick="navTo('homework')">
      <span class="bnav-icon">📝</span><span class="bnav-label" data-en="Homework" data-zh="作业">作业</span>
    </button>
    <button class="bnav-item" data-panel="admin" id="bnav-admin" style="display:none" onclick="navTo('admin')">
      <span class="bnav-icon">👩‍🏫</span><span class="bnav-label" data-en="Admin" data-zh="管理">管理</span>
    </button>
  </nav>

</div><!-- /app-shell -->

<!-- Select-to-Translate Popup -->
<div id="stt-popup" class="stt-popup" role="tooltip" aria-live="polite"></div>

<!-- Toast -->
<div id="toast-el" class="toast" role="alert" aria-live="polite"></div>

<!-- Modal Overlay -->
<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" style="display:none">
  <div class="modal-card" id="modal-card"></div>
</div>

<!-- Combo Popup -->
<div class="combo-pop" id="combo-el"></div>

<!-- Supabase SDK + App Bundle: defer = non-blocking parse, execute in order after DOM ready -->
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/app.bundle.min.js?v=5.19.0"></script>
<!-- homework.min.js loaded dynamically for students with classes + teachers (see auth.js) -->
<!-- admin.js + vocab-admin.js loaded dynamically for teachers (see auth.js) -->

<!-- Service Worker registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  });
}
</script>

</body>
</html>
