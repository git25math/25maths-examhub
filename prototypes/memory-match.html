<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词消消乐 ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════ */
        /*  CSS Variables & Reset                      */
        /* ═══════════════════════════════════════════ */
        :root {
            --pastel-blue: #B8D8E8;
            --pastel-pink: #F8C8D4;
            --pastel-mint: #B5E8D5;
            --pastel-peach: #FCDEC0;
            --pastel-lilac: #D4C5F0;
            --pastel-yellow: #FDF0C4;
            --card-back-1: #7C6DAF;
            --card-back-2: #E8A0BF;
            --card-back-3: #6DAFB0;
            --bg-cream: #FEF9F2;
            --text-dark: #4A3F5C;
            --text-mid: #8A80A0;
            --shadow-soft: rgba(120, 100, 160, 0.15);
            --radius-card: 16px;
            --radius-btn: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Decorative floating shapes background */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 300px; height: 300px;
            background: var(--pastel-pink);
            top: -80px; right: -60px;
            animation: floatBlob 12s ease-in-out infinite;
        }
        body::after {
            width: 250px; height: 250px;
            background: var(--pastel-blue);
            bottom: -60px; left: -40px;
            animation: floatBlob 15s ease-in-out infinite reverse;
        }
        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -30px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        /* ═══════════════════════════════════════════ */
        /*  Game Container                             */
        /* ═══════════════════════════════════════════ */
        #game-container {
            width: 100%;
            max-width: 520px;
            padding: 20px 16px;
            position: relative;
            z-index: 1;
        }

        /* ═══════════════════════════════════════════ */
        /*  Header                                     */
        /* ═══════════════════════════════════════════ */
        header {
            text-align: center;
            margin-bottom: 16px;
        }

        #level-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--pastel-lilac), var(--pastel-pink));
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        #level-title {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--card-back-1), var(--card-back-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-mid);
        }

        .stat-icon {
            font-size: 18px;
        }

        /* Progress bar */
        .progress-wrapper {
            margin-top: 12px;
            background: #EDE8F5;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pastel-mint), var(--pastel-blue), var(--pastel-lilac));
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ═══════════════════════════════════════════ */
        /*  Game Grid                                  */
        /* ═══════════════════════════════════════════ */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 8px;
            perspective: 1000px;
        }

        /* ═══════════════════════════════════════════ */
        /*  Cards                                      */
        /* ═══════════════════════════════════════════ */
        .card-wrapper {
            aspect-ratio: 1;
            perspective: 800px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px) scale(0.8);
            animation: cardAppear 0.4s ease-out forwards;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--radius-card);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
        }

        /* Card Back (the "hidden" face you see first) */
        .card-back {
            background: linear-gradient(145deg, var(--card-back-1), var(--card-back-2));
            box-shadow:
                0 4px 12px var(--shadow-soft),
                inset 0 2px 0 rgba(255,255,255,0.2);
        }

        .card-back::before {
            content: '?';
            font-size: 28px;
            color: rgba(255,255,255,0.5);
            font-weight: 900;
        }

        /* Decorative dots on card back */
        .card-back::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 10px;
        }

        /* Card Front (revealed content) */
        .card-front {
            background: white;
            transform: rotateY(180deg);
            box-shadow:
                0 4px 16px var(--shadow-soft),
                inset 0 0 0 2px rgba(120, 100, 160, 0.08);
            flex-direction: column;
            padding: 8px;
            gap: 2px;
        }

        .card-type-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-mid);
            font-weight: 600;
        }

        .card-text {
            font-size: 15px;
            color: var(--text-dark);
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
        }

        .card-type-word .card-front {
            border-bottom: 3px solid var(--pastel-blue);
        }
        .card-type-def .card-front {
            border-bottom: 3px solid var(--pastel-peach);
        }

        /* Match animation */
        .card-wrapper.matched {
            animation: matchPop 0.5s ease-out forwards;
        }
        @keyframes matchPop {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Shake animation */
        .card-wrapper.shake .card {
            animation: jellyShake 0.5s ease-in-out;
        }
        @keyframes jellyShake {
            0% { transform: rotateY(180deg) translateX(0); }
            20% { transform: rotateY(180deg) translateX(-6px) rotate(-2deg); }
            40% { transform: rotateY(180deg) translateX(6px) rotate(2deg); }
            60% { transform: rotateY(180deg) translateX(-4px) rotate(-1deg); }
            80% { transform: rotateY(180deg) translateX(3px) rotate(0.5deg); }
            100% { transform: rotateY(180deg) translateX(0); }
        }

        /* Hint pulse */
        .card-wrapper.hint-pulse .card-back {
            animation: hintGlow 0.8s ease-in-out;
        }
        @keyframes hintGlow {
            0%, 100% { box-shadow: 0 4px 12px var(--shadow-soft); }
            50% { box-shadow: 0 0 20px rgba(168, 230, 207, 0.6); }
        }

        /* ═══════════════════════════════════════════ */
        /*  Particle Canvas                            */
        /* ═══════════════════════════════════════════ */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* ═══════════════════════════════════════════ */
        /*  Overlays                                   */
        /* ═══════════════════════════════════════════ */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(74, 63, 92, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.visible {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 36px 32px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-emoji {
            font-size: 56px;
            margin-bottom: 8px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        .modal-subtitle {
            font-size: 14px;
            color: var(--text-mid);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .modal-stat {
            text-align: center;
        }

        .modal-stat-value {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--card-back-1), var(--card-back-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-stat-label {
            font-size: 11px;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            border: none;
            border-radius: var(--radius-btn);
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--card-back-1), var(--card-back-2));
            color: white;
            box-shadow: 0 4px 16px rgba(124, 109, 175, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(124, 109, 175, 0.5);
        }

        .btn-secondary {
            background: #EDE8F5;
            color: var(--card-back-1);
            margin-top: 8px;
        }

        /* ═══════════════════════════════════════════ */
        /*  Start Screen                               */
        /* ═══════════════════════════════════════════ */
        #start-screen {
            display: flex;
        }

        .start-content {
            text-align: center;
        }

        .start-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--card-back-1), var(--card-back-2), var(--card-back-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .start-subtitle {
            font-size: 15px;
            color: var(--text-mid);
            margin-bottom: 28px;
        }

        .level-select {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .level-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: white;
            border: 2px solid #EDE8F5;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
        }

        .level-btn:hover {
            border-color: var(--pastel-lilac);
            transform: translateX(4px);
            box-shadow: 0 4px 12px var(--shadow-soft);
        }

        .level-btn .level-num {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .level-btn:nth-child(1) .level-num { background: linear-gradient(135deg, var(--pastel-blue), var(--card-back-3)); }
        .level-btn:nth-child(2) .level-num { background: linear-gradient(135deg, var(--pastel-pink), var(--card-back-2)); }
        .level-btn:nth-child(3) .level-num { background: linear-gradient(135deg, var(--pastel-lilac), var(--card-back-1)); }
        .level-btn:nth-child(4) .level-num { background: linear-gradient(135deg, var(--pastel-mint), #5DAFA0); }
        .level-btn:nth-child(5) .level-num { background: linear-gradient(135deg, var(--pastel-peach), #E88060); }

        .level-btn .level-info {
            flex: 1;
        }

        .level-btn .level-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .level-btn .level-count {
            font-size: 12px;
            color: var(--text-mid);
        }

        /* ═══════════════════════════════════════════ */
        /*  Combo / Streak indicator                   */
        /* ═══════════════════════════════════════════ */
        .combo-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            pointer-events: none;
            z-index: 60;
            opacity: 0;
        }

        .combo-popup.show {
            animation: comboFloat 1s ease-out forwards;
        }

        @keyframes comboFloat {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(0.8); }
        }

        /* ═══════════════════════════════════════════ */
        /*  Responsive                                 */
        /* ═══════════════════════════════════════════ */
        @media (max-width: 400px) {
            #game-grid { gap: 8px; padding: 4px; }
            .card-text { font-size: 13px; }
            .card-type-label { font-size: 8px; }
            #level-title { font-size: 22px; }
        }
    </style>
</head>

<!-- Particle effects canvas -->
<canvas id="particle-canvas"></canvas>

<!-- ═══════════ Start Screen ═══════════ -->
<div class="overlay" id="start-screen">
    <div class="modal start-content">
        <div class="modal-emoji">✨</div>
        <div class="start-title">单词消消乐</div>
        <div class="start-subtitle">翻牌配对，记住英文和中文的搭配吧！</div>
        <div class="level-select" id="level-select">
            <!-- Dynamically populated -->
        </div>
    </div>
</div>

<!-- ═══════════ End Screen ═══════════ -->
<div class="overlay" id="end-screen">
    <div class="modal">
        <div class="modal-emoji" id="end-emoji">🏆</div>
        <div class="modal-title" id="end-title">太强了！</div>
        <div class="modal-subtitle" id="end-subtitle">全部配对成功！</div>
        <div class="modal-stats">
            <div class="modal-stat">
                <div class="modal-stat-value" id="end-time">0</div>
                <div class="modal-stat-label">用时(秒)</div>
            </div>
            <div class="modal-stat">
                <div class="modal-stat-value" id="end-moves">0</div>
                <div class="modal-stat-label">翻牌次数</div>
            </div>
            <div class="modal-stat">
                <div class="modal-stat-value" id="end-combo">0</div>
                <div class="modal-stat-label">最高连击</div>
            </div>
        </div>
        <button class="btn btn-primary" id="end-next-btn">挑战下一关</button>
        <br>
        <button class="btn btn-secondary" id="end-menu-btn">返回菜单</button>
    </div>
</div>

<!-- ═══════════ Game Area ═══════════ -->
<div id="game-container">

            <div class="stat-item">
                <span class="stat-icon">🃏</span>
                <span id="moves-display">0 次翻牌</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">🔥</span>
                <span id="combo-display">0 连击</span>
            </div>
        </div>
        <div class="progress-wrapper">
            <div id="progress-bar"></div>
        </div>
    </header>

    <div id="game-grid"></div>
</div>

<!-- Combo popup -->
<div class="combo-popup" id="combo-popup"></div>

const timeDisplay = document.getElementById('time-display');
const movesDisplay = document.getElementById('moves-display');
const comboDisplay = document.getElementById('combo-display');
const comboPopup = document.getElementById('combo-popup');
const particleCanvas = document.getElementById('particle-canvas');
const ctx = particleCanvas.getContext('2d');

// Game state
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matchedPairs = 0;
let totalPairs = 0;
let moveCount = 0;
let comboStreak = 0;
let maxCombo = 0;
let timerInterval = null;
let elapsedTime = 0;
let currentLevelIndex = 0;
let particles = [];

// ── Particle System ──
function resizeCanvas() {
    particleCanvas.width = window.innerWidth;
    particleCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const PARTICLE_COLORS = ['#F8B195', '#F67280', '#C06C84', '#6C5B7B', '#A8E6CF', '#DCEDC1', '#FFD93D', '#FF6B6B'];

function spawnParticles(x, y, count = 12) {
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const speed = 2 + Math.random() * 4;
        const size = 3 + Math.random() * 5;
        const shapes = ['circle', 'star', 'heart'];
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            size,
            color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
            life: 1,
            decay: 0.015 + Math.random() * 0.02,
            shape: shapes[Math.floor(Math.random() * shapes.length)],
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
}

function drawStar(cx, cy, size, color, alpha, rotation) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const r = i === 0 ? size : size;
        ctx.lineTo(Math.cos(a) * size, Math.sin(a) * size);
        const b = a + (2 * Math.PI) / 5;
        ctx.lineTo(Math.cos((a + b) / 2) * size * 0.4, Math.sin((a + b) / 2) * size * 0.4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function drawHeart(cx, cy, size, color, alpha, rotation) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    const s = size * 0.6;
    ctx.moveTo(0, s * 0.4);
    ctx.bezierCurveTo(-s, -s * 0.3, -s * 0.5, -s, 0, -s * 0.4);
    ctx.bezierCurveTo(s * 0.5, -s, s, -s * 0.3, 0, s * 0.4);
    ctx.fill();
    ctx.restore();
}

function animateParticles() {
    ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1; // gravity
        p.life -= p.decay;
        p.rotation += p.rotSpeed;

        if (p.shape === 'star') {
            drawStar(p.x, p.y, p.size, p.color, p.life, p.rotation);
        } else if (p.shape === 'heart') {
            drawHeart(p.x, p.y, p.size, p.color, p.life, p.rotation);
        } else {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animateParticles);
}
animateParticles();

// ── Utility ──
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// ── Build Start Screen ──
function buildLevelMenu() {
    levelSelect.innerHTML = '';
    LEVELS.forEach((lvl, i) => {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        const pairCount = lvl.vocabulary.length / 2;
        btn.innerHTML = `
            <div class="level-num">${i + 1}</div>
            <div class="level-info">
                <div class="level-name">${lvl.title}</div>
                <div class="level-count">${pairCount} 组词汇</div>
            </div>
        `;
        btn.addEventListener('click', () => {
            currentLevelIndex = i;
            startGame(i);
        });
        levelSelect.appendChild(btn);
    });
}

// ── Start Game ──
function startGame(levelIndex) {
    const level = LEVELS[levelIndex];
    startScreen.classList.remove('visible');
    startScreen.style.display = 'none';
    endScreen.classList.remove('visible');
    endScreen.style.display = 'none';

    // Reset state
    gridEl.innerHTML = '';
    firstCard = secondCard = null;
    lockBoard = false;
    matchedPairs = 0;
    moveCount = 0;
    comboStreak = 0;
    maxCombo = 0;
    totalPairs = level.vocabulary.length / 2;
    elapsedTime = 0;

    // Update header
    document.getElementById('level-badge').textContent = level.badge;
    document.getElementById('level-title').textContent = level.title;
    updateStats();

    // Determine grid columns
    const total = level.vocabulary.length;
    const cols = total <= 12 ? 4 : 4;
    gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    // Shuffle and render
    const shuffled = shuffle(level.vocabulary);
    shuffled.forEach((item, idx) => {
        const wrapper = document.createElement('div');
        wrapper.className = `card-wrapper card-type-${item.type}`;
        wrapper.style.animationDelay = `${idx * 0.05}s`;
        wrapper.dataset.pairId = item.id;
        wrapper.dataset.type = item.type;

        wrapper.innerHTML = `
            <div class="card">
                <div class="card-face card-back"></div>
                <div class="card-face card-front">
                    <div class="card-type-label">${item.type === 'word' ? 'English' : '中文'}</div>
                    <div class="card-text">${item.content}</div>
                </div>
            </div>
        `;

        wrapper.addEventListener('click', () => flipCard(wrapper));
        gridEl.appendChild(wrapper);
    });

    // Start timer
    startTimer();
}

// ── Flip Logic ──
function flipCard(wrapper) {
    if (lockBoard) return;
    if (wrapper === firstCard) return;
    if (wrapper.classList.contains('matched')) return;

    const card = wrapper.querySelector('.card');
    card.classList.add('flipped');

    if (!firstCard) {
        firstCard = wrapper;
        return;
    }

    secondCard = wrapper;
    moveCount++;
    lockBoard = true;
    updateStats();
    checkMatch();
}

function checkMatch() {
    const id1 = firstCard.dataset.pairId;
    const id2 = secondCard.dataset.pairId;
    const type1 = firstCard.dataset.type;
    const type2 = secondCard.dataset.type;

    // Must be same pair ID but different type (word ↔ def)
    const isMatch = (id1 === id2) && (type1 !== type2);

    if (isMatch) {
        handleMatch();
    } else {
        handleMismatch();
    }
}

function handleMatch() {
    comboStreak++;
    if (comboStreak > maxCombo) maxCombo = comboStreak;
    matchedPairs++;
    updateStats();

    // Particle burst at both card positions
    [firstCard, secondCard].forEach(w => {
        const rect = w.getBoundingClientRect();
        spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, 15);
    });

    // Show combo text
    if (comboStreak >= 2) {
        showCombo(comboStreak);
    }

    // Animate match & remove
    setTimeout(() => {
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');
        resetBoard();

        if (matchedPairs === totalPairs) {
            setTimeout(() => endGame(true), 400);
        }
    }, 400);
}

function handleMismatch() {
    comboStreak = 0;
    updateStats();

    firstCard.classList.add('shake');
    secondCard.classList.add('shake');

    setTimeout(() => {
        firstCard.querySelector('.card').classList.remove('flipped');
        secondCard.querySelector('.card').classList.remove('flipped');
        firstCard.classList.remove('shake');
        secondCard.classList.remove('shake');
        resetBoard();
    }, 700);
}

function resetBoard() {
    firstCard = secondCard = null;
    lockBoard = false;
}

// ── Combo Popup ──
function showCombo(n) {
    const messages = ['', '', 'Nice! ×2', 'Great! ×3', 'Amazing! ×4', 'Incredible! ×5'];
    const emojis = ['', '', '⚡', '🔥', '💥', '🌟'];
    const idx = Math.min(n, 5);
    comboPopup.textContent = `${emojis[idx]} ${messages[idx]}`;
    comboPopup.style.color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
    comboPopup.className = 'combo-popup';
    void comboPopup.offsetWidth;
    comboPopup.classList.add('show');
}

// ── Timer ──
function startTimer() {
    clearInterval(timerInterval);
    elapsedTime = 0;
    timerInterval = setInterval(() => {
        elapsedTime++;
        timeDisplay.textContent = `${elapsedTime}s`;
    }, 1000);
}

// ── Stats ──
function updateStats() {
    movesDisplay.textContent = `${moveCount} 次翻牌`;
    comboDisplay.textContent = `${comboStreak} 连击`;
    const pct = totalPairs === 0 ? 0 : Math.round((matchedPairs / totalPairs) * 100);
    progressBar.style.width = `${pct}%`;
}

// ── End Game ──
function endGame(isWin) {
    clearInterval(timerInterval);
    endScreen.style.display = 'flex';
    endScreen.classList.add('visible');

    if (isWin) {
        document.getElementById('end-emoji').textContent = '🏆';
        document.getElementById('end-title').textContent = getWinMessage();
        document.getElementById('end-subtitle').textContent = '全部配对成功！继续加油！';

        // Big particle celebration
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                spawnParticles(
                    Math.random() * window.innerWidth,
                    Math.random() * window.innerHeight * 0.5,
                    20
                );
            }, i * 200);
        }
    } else {
        document.getElementById('end-emoji').textContent = '😅';
        document.getElementById('end-title').textContent = '差一点点！';
        document.getElementById('end-subtitle').textContent = '再试一次吧，你可以的！';
    }

    document.getElementById('end-time').textContent = elapsedTime;
    document.getElementById('end-moves').textContent = moveCount;
    document.getElementById('end-combo').textContent = maxCombo;

    // Next level button
    const nextBtn = document.getElementById('end-next-btn');
    if (currentLevelIndex < LEVELS.length - 1) {
        nextBtn.style.display = 'inline-block';
        nextBtn.textContent = '挑战下一关';
        nextBtn.onclick = () => {
            currentLevelIndex++;
            startGame(currentLevelIndex);
        };
    } else {
        nextBtn.style.display = 'inline-block';
        nextBtn.textContent = '🎉 再玩一遍';
        nextBtn.onclick = () => {
            currentLevelIndex = 0;
            startGame(0);
        };
    }

    document.getElementById('end-menu-btn').onclick = () => {
        endScreen.style.display = 'none';
        endScreen.classList.remove('visible');
        startScreen.style.display = 'flex';
        startScreen.classList.add('visible');
    };
}

function getWinMessage() {
    const msgs = ['太神了！', '完美通关！', '你也太强了吧！', '无敌！', '满分！'];
    return msgs[Math.floor(Math.random() * msgs.length)];
}

// ── Init ──
buildLevelMenu();
startScreen.style.display = 'flex';
startScreen.classList.add('visible');

</script>
