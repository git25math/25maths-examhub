<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词消消乐 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--pb:#B8D8E8;--pp:#F8C8D4;--pm:#B5E8D5;--pc:#FCDEC0;--pl:#D4C5F0;--ga:#7C6DAF;--gb:#E8A0BF;--gc:#6DAFB0;--bg:#FEF9F2;--t1:#4A3F5C;--t2:#8A80A0;--sh:rgba(120,100,160,.14);--r:16px;--rb:24px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:var(--t1);overflow-x:hidden}
body::before,body::after{content:'';position:fixed;border-radius:50%;opacity:.09;z-index:0;pointer-events:none}
body::before{width:300px;height:300px;background:var(--pp);top:-80px;right:-60px;animation:drift 14s ease-in-out infinite}
body::after{width:260px;height:260px;background:var(--pb);bottom:-60px;left:-40px;animation:drift 18s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(18px,-22px) scale(1.04)}66%{transform:translate(-12px,14px) scale(.96)}}

/* ═══ SHARED ═══ */
.ov{position:fixed;inset:0;background:rgba(74,63,92,.72);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:none;justify-content:center;align-items:center;z-index:100;overflow-y:auto;padding:20px 0}
.ov.vis{display:flex}
.md{background:#fff;border-radius:26px;padding:28px 22px;text-align:center;max-width:420px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.17);animation:mpop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes mpop{0%{transform:scale(.55);opacity:0}100%{transform:scale(1);opacity:1}}
.md-emoji{font-size:44px;margin-bottom:2px}.md-title{font-size:20px;font-weight:900;margin-bottom:3px}.md-sub{font-size:12px;color:var(--t2);margin-bottom:12px;line-height:1.5}
.mstats{display:flex;justify-content:center;gap:16px;margin-bottom:16px}
.ms-v{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--ga),var(--gb));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ms-l{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.btn{display:inline-block;padding:10px 26px;border:none;border-radius:var(--rb);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0)}
.btn-p{background:linear-gradient(135deg,var(--ga),var(--gb));color:#fff;box-shadow:0 4px 14px rgba(124,109,175,.35)}
.btn-s{background:#EDE8F5;color:var(--ga);margin-top:6px}
.btn-mint{background:linear-gradient(135deg,var(--gc),#5dafa0);color:#fff;box-shadow:0 4px 14px rgba(100,175,170,.35)}
.btn-warn{background:linear-gradient(135deg,#E8A0BF,#E85D75);color:#fff}
.btn-group{display:flex;flex-direction:column;gap:7px;align-items:center;width:100%}

/* ═══ AUTH ═══ */
.auth-box{max-width:360px;width:94%}
.auth-input{width:100%;padding:12px 16px;border:2px solid #EDE8F5;border-radius:14px;font-family:inherit;font-size:15px;outline:none;transition:border .2s;margin-bottom:10px}
.auth-input:focus{border-color:var(--pl)}
.auth-err{color:#D35D6E;font-size:12px;margin-bottom:8px;min-height:18px}
.auth-note{font-size:11px;color:var(--t2);margin-top:10px;line-height:1.4}
.user-bar{position:fixed;top:0;left:0;right:0;z-index:90;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding:8px 16px;display:none;align-items:center;justify-content:space-between;box-shadow:0 2px 12px var(--sh)}
.user-bar.vis{display:flex}
.user-info{display:flex;align-items:center;gap:8px}
.user-rank{font-size:20px}.user-name{font-size:13px;font-weight:700;color:var(--t1)}.user-rank-label{font-size:10px;color:var(--t2);font-weight:600}
.user-bar .btn{padding:6px 14px;font-size:12px}

/* ═══ RANK BADGE ═══ */
.rank-card{background:linear-gradient(135deg,var(--ga),var(--gb));border-radius:18px;padding:20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.rank-card::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%}
.rank-emoji{font-size:36px}.rank-name{font-size:18px;font-weight:900;margin:4px 0 2px}.rank-progress-text{font-size:11px;opacity:.8}
.rank-bar{background:rgba(255,255,255,.2);border-radius:8px;height:6px;margin-top:8px;overflow:hidden}
.rank-bar-fill{height:100%;background:#fff;border-radius:8px;transition:width .6s ease}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:0;margin-bottom:14px;background:#EDE8F5;border-radius:12px;padding:3px;width:100%}
.tab{flex:1;padding:8px 0;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--t2);transition:all .2s}
.tab.active{background:#fff;color:var(--t1);box-shadow:0 2px 8px var(--sh)}

/* ═══ LEVEL LIST ═══ */
.s-title{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--ga),var(--gb),var(--gc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.s-sub{font-size:12px;color:var(--t2);margin-bottom:14px}
.lvl-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;max-height:40vh;overflow-y:auto;padding:2px 4px}
.lvl-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:2px solid #EDE8F5;border-radius:14px;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;width:100%}
.lvl-btn:hover{border-color:var(--pl);transform:translateX(4px);box-shadow:0 4px 12px var(--sh)}
.lvl-num{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;flex-shrink:0}
.lvl-name{font-size:12px;font-weight:700}.lvl-meta{font-size:10px;color:var(--t2)}.lvl-best{font-size:9px;color:var(--ga);font-weight:700;margin-top:1px}
.lvl-btn.locked{opacity:.4;pointer-events:none}
.lvl-btn:nth-child(5n+1) .lvl-num{background:linear-gradient(135deg,var(--pb),var(--gc))}
.lvl-btn:nth-child(5n+2) .lvl-num{background:linear-gradient(135deg,var(--pp),var(--gb))}
.lvl-btn:nth-child(5n+3) .lvl-num{background:linear-gradient(135deg,var(--pl),var(--ga))}
.lvl-btn:nth-child(5n+4) .lvl-num{background:linear-gradient(135deg,var(--pm),#5dafa0)}
.lvl-btn:nth-child(5n+5) .lvl-num{background:linear-gradient(135deg,var(--pc),#e88060)}

/* ═══ MODE CARDS ═══ */
.mode-card{display:flex;align-items:center;gap:12px;padding:14px;background:#fff;border:2px solid #EDE8F5;border-radius:16px;cursor:pointer;transition:all .25s;text-align:left;font-family:inherit;width:100%}
.mode-card:hover{border-color:var(--pl);transform:translateY(-2px);box-shadow:0 6px 18px var(--sh)}
.mode-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mode-icon.study{background:linear-gradient(135deg,var(--pm),var(--gc))}.mode-icon.battle{background:linear-gradient(135deg,var(--pp),var(--gb))}.mode-icon.review{background:linear-gradient(135deg,var(--pl),var(--ga))}
.mode-name{font-size:14px;font-weight:800}.mode-desc{font-size:10px;color:var(--t2);line-height:1.4;margin-top:2px}
.mode-list{display:flex;flex-direction:column;gap:8px;margin:14px 0 8px}
.review-badge{display:inline-block;background:#FDDEDE;color:#D35D6E;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px}

/* ═══ STUDY MODE ═══ */
.area{width:100%;max-width:540px;padding:16px 14px;padding-top:56px;position:relative;z-index:1;display:none}
.area.active{display:block}
.area-header{text-align:center;margin-bottom:12px}
.area-badge{display:inline-block;color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:1px;margin-bottom:3px}
.badge-study{background:linear-gradient(135deg,var(--pm),var(--gc))}.badge-battle{background:linear-gradient(135deg,var(--pl),var(--pp))}.badge-review{background:linear-gradient(135deg,var(--pl),var(--ga))}
.area-title{font-size:19px;font-weight:900;color:var(--t1)}.area-prog{font-size:11px;color:var(--t2);margin-top:3px}
.pbar-wrap{margin-top:7px;border-radius:10px;height:6px;overflow:hidden}
.pbar-green{background:#E0F5EC}.pbar-purple{background:#EDE8F5}
.pbar-fill{height:100%;border-radius:10px;transition:width .4s ease}
.fill-green{background:linear-gradient(90deg,var(--pm),var(--gc))}.fill-purple{background:linear-gradient(90deg,var(--pm),var(--pb),var(--pl))}

/* Flashcard */
.fc-box{perspective:1000px;margin:18px auto;width:280px;height:175px;cursor:pointer}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.175,.885,.32,1.275)}
.fc-box.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:16px}
.fc-front{background:linear-gradient(145deg,var(--ga),var(--gb));color:#fff;box-shadow:0 6px 20px var(--sh)}
.fc-fl{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.fc-fw{font-size:25px;font-weight:900}.fc-fh{font-size:10px;opacity:.4;margin-top:10px}
.fc-back{transform:rotateY(180deg);background:#fff;box-shadow:0 6px 20px var(--sh);border:2px solid var(--pm)}
.fc-bl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.fc-bd{font-size:25px;font-weight:900;color:var(--t1)}.fc-bw{font-size:12px;color:var(--t2);margin-top:7px}
.fc-actions{display:flex;justify-content:center;gap:10px;margin-top:18px}
.fc-rb{padding:9px 20px;border:none;border-radius:var(--rb);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;opacity:.85}
.fc-rb:hover{opacity:1;transform:translateY(-2px)}
.fc-rb.hard{background:#FDDEDE;color:#D35D6E}.fc-rb.ok{background:#FFF3D6;color:#C4960C}.fc-rb.easy{background:#D6F5E8;color:#3BA776}
.fc-actions.hidden{visibility:hidden;pointer-events:none}

/* Study summary */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.sum-item{padding:10px 6px;border-radius:14px;text-align:center}
.sum-item.hbg{background:#FDDEDE}.sum-item.obg{background:#FFF3D6}.sum-item.ebg{background:#D6F5E8}
.sum-val{font-size:22px;font-weight:900}.sum-lab{font-size:9px;font-weight:600;margin-top:2px}

/* ═══ BATTLE ═══ */
.sbar{display:flex;justify-content:center;gap:14px;margin-top:6px;flex-wrap:wrap}
.si{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:600;color:var(--t2)}.si-i{font-size:14px}
.si.warn{color:#E85D75}.si.warn .si-i{animation:pulse .6s ease-in-out infinite alternate}
@keyframes pulse{to{transform:scale(1.25)}}
#grid{display:grid;gap:9px;padding:5px;perspective:1000px}
.cs{aspect-ratio:1;perspective:800px;cursor:pointer;opacity:0;transform:translateY(16px) scale(.85);animation:slotIn .35s ease-out forwards}
@keyframes slotIn{to{opacity:1;transform:translateY(0) scale(1)}}
.cs.done{pointer-events:none}
.ci{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.175,.885,.32,1.275)}
.cs.flipped .ci{transform:rotateY(180deg)}
.cf{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;justify-content:center;align-items:center}
.cf-b{background:linear-gradient(145deg,var(--ga),var(--gb));box-shadow:0 4px 14px var(--sh),inset 0 2px 0 rgba(255,255,255,.18)}
.cf-b::before{content:'?';font-size:22px;color:rgba(255,255,255,.4);font-weight:900}
.cf-b::after{content:'';position:absolute;inset:6px;border:2px dashed rgba(255,255,255,.11);border-radius:11px}
.cf-f{transform:rotateY(180deg);background:#fff;box-shadow:0 4px 16px var(--sh),inset 0 0 0 2px rgba(120,100,160,.06);padding:5px 4px;gap:2px}
.ct-l{font-size:8px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);font-weight:600}
.ct-t{font-size:14px;font-weight:700;color:var(--t1);text-align:center;line-height:1.25;word-break:break-word}
.cs[data-tp="word"] .cf-f{border-bottom:3px solid var(--pb)}.cs[data-tp="def"] .cf-f{border-bottom:3px solid var(--pc)}
.cs.match-go{animation:mB .55s ease-out forwards;pointer-events:none}
@keyframes mB{0%{transform:scale(1);opacity:1}35%{transform:scale(1.14);opacity:1}100%{transform:scale(0);opacity:0}}
.cs.shake-go .ci{animation:jS .45s ease-in-out}
@keyframes jS{0%{transform:rotateY(180deg) translateX(0)}20%{transform:rotateY(180deg) translateX(-6px) rotate(-1.5deg)}40%{transform:rotateY(180deg) translateX(6px) rotate(1.5deg)}60%{transform:rotateY(180deg) translateX(-3px)}100%{transform:rotateY(180deg) translateX(0)}}

/* ═══ MASTERY DASHBOARD ═══ */
.mastery-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;max-height:45vh;overflow-y:auto;padding:2px}
.word-chip{padding:8px 10px;border-radius:12px;text-align:left;border:2px solid #EDE8F5;font-size:12px;transition:all .2s}
.word-chip .wc-en{font-weight:700;color:var(--t1)}.word-chip .wc-zh{font-size:11px;color:var(--t2)}
.word-chip.mastered{border-color:var(--pm);background:#F0FBF5}
.word-chip.learning{border-color:var(--pc);background:#FFFBF0}
.word-chip.new-word{border-color:#EDE8F5;background:#fff}
.mastery-stats{display:flex;gap:12px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.mstat{text-align:center;padding:8px 14px;border-radius:12px;background:#fff;box-shadow:0 2px 8px var(--sh)}
.mstat-num{font-size:20px;font-weight:900}.mstat-lab{font-size:9px;color:var(--t2);font-weight:600}

/* FX */
.bf{position:fixed;pointer-events:none;z-index:60;font-size:18px;font-weight:900;opacity:0}
.bf.show{animation:bfl .9s ease-out forwards}
@keyframes bfl{0%{opacity:1;transform:translate(-50%,-50%) scale(.6)}25%{opacity:1;transform:translate(-50%,-70%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-130%) scale(.8)}}
.combo-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:900;pointer-events:none;z-index:60;opacity:0}
.combo-pop.show{animation:cfl 1s ease-out forwards}
@keyframes cfl{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-65%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-130%) scale(.8)}}
#fx{position:fixed;inset:0;pointer-events:none;z-index:50}
@media(max-width:400px){#grid{gap:6px}.ct-t{font-size:11px}.fc-box{width:240px;height:155px}.fc-fw,.fc-bd{font-size:21px}.mastery-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="fx"></canvas>

<!-- ══════ USER BAR ══════ -->
<div class="user-bar" id="user-bar">
  <div class="user-info"><span class="user-rank" id="ub-rank"></span><div><div class="user-name" id="ub-name"></div><div class="user-rank-label" id="ub-rlabel"></div></div></div>
  <div style="display:flex;gap:6px"><button class="btn btn-s" onclick="showMastery()" style="margin:0;padding:6px 12px;font-size:11px">📊 词库</button><button class="btn btn-s" id="ub-logout" style="margin:0;padding:6px 12px;font-size:11px">退出</button></div>
</div>

<!-- ══════ AUTH SCREEN ══════ -->
<div class="ov vis" id="ov-auth"><div class="md auth-box">
  <div class="md-emoji">✨</div><div class="s-title">单词消消乐</div><div class="md-sub">输入邮箱，开始你的单词之旅</div>
  <input class="auth-input" id="auth-email" type="email" placeholder="你的邮箱地址">
  <input class="auth-input" id="auth-pass" type="password" placeholder="密码 (至少6位)">
  <div class="auth-err" id="auth-err"></div>
  <div class="btn-group">
    <button class="btn btn-p" id="auth-login" style="width:100%">登录 / 注册</button>
    <button class="btn btn-s" id="auth-skip">先不登录，直接体验</button>
  </div>
  <div class="auth-note">首次输入邮箱将自动注册<br>登录后可跨设备同步进度</div>
</div></div>

<!-- ══════ MAIN MENU ══════ -->
<div class="ov" id="ov-menu"><div class="md" style="max-width:420px">
  <div class="rank-card" id="rank-card"><div class="rank-emoji" id="rc-emoji">🥉</div><div class="rank-name" id="rc-name">青铜学员</div><div class="rank-progress-text" id="rc-prog"></div><div class="rank-bar"><div class="rank-bar-fill" id="rc-bar"></div></div></div>
  <div class="tabs"><button class="tab active" data-tab="levels" onclick="switchTab(this)">闯关</button><button class="tab" data-tab="mastery" onclick="switchTab(this)">词库总览</button></div>
  <div id="tab-levels"><div class="lvl-list" id="lvl-list"></div></div>
  <div id="tab-mastery" style="display:none"><div class="mastery-stats" id="mst-stats"></div><div class="mastery-grid" id="mst-grid"></div></div>
</div></div>

<!-- ══════ MODE SELECT ══════ -->
<div class="ov" id="ov-mode"><div class="md">
  <div class="md-emoji">📚</div><div class="md-title" id="mode-title"></div><div class="md-sub" id="mode-sub"></div>
  <div class="mode-list">
    <button class="mode-card" id="mc-study"><div class="mode-icon study">📖</div><div><div class="mode-name">学习模式</div><div class="mode-desc">逐个翻牌认词，自评掌握程度，零压力</div></div></button>
    <button class="mode-card" id="mc-battle"><div class="mode-icon battle">⚔️</div><div><div class="mode-name">实战模式</div><div class="mode-desc">限时配对消消乐，记录最佳成绩</div></div></button>
    <button class="mode-card" id="mc-review"><div class="mode-icon review">🔄</div><div><div class="mode-name">复习模式<span class="review-badge" id="rv-badge">0</span></div><div class="mode-desc">间隔重复，专攻不熟和模糊的词</div></div></button>
  </div>
  <button class="btn btn-s" onclick="showMenu()">← 返回</button>
</div></div>

<!-- ══════ STUDY END ══════ -->
<div class="ov" id="ov-study-end"><div class="md">
  <div class="md-emoji">🎓</div><div class="md-title">学习完成！</div><div class="md-sub" id="se-sub"></div>
  <div class="sum-grid"><div class="sum-item hbg"><div class="sum-val" id="se-hard">0</div><div class="sum-lab">😵 不熟</div></div><div class="sum-item obg"><div class="sum-val" id="se-ok">0</div><div class="sum-lab">🤔 模糊</div></div><div class="sum-item ebg"><div class="sum-val" id="se-easy">0</div><div class="sum-lab">✅ 掌握</div></div></div>
  <div class="btn-group"><button class="btn btn-mint" id="se-battle">⚔️ 进入实战</button><button class="btn btn-s" id="se-restudy">📖 再学不熟的</button><button class="btn btn-s" onclick="showMenu()">← 返回菜单</button></div>
</div></div>

<!-- ══════ BATTLE END ══════ -->
<div class="ov" id="ov-end"><div class="md">
  <div class="md-emoji" id="e-emoji">🏆</div><div class="md-title" id="e-title"></div><div class="md-sub" id="e-sub"></div>
  <div class="mstats"><div><div class="ms-v" id="e-time">0</div><div class="ms-l">用时</div></div><div><div class="ms-v" id="e-moves">0</div><div class="ms-l">翻牌</div></div><div><div class="ms-v" id="e-combo">0</div><div class="ms-l">连击</div></div></div>
  <div id="e-best" style="font-size:11px;color:var(--ga);font-weight:700;margin-bottom:12px"></div>
  <div class="btn-group"><button class="btn btn-p" id="e-action"></button><button class="btn btn-s" id="e-retry">🔄 再试一次</button><button class="btn btn-s" onclick="showMenu()">← 返回菜单</button></div>
</div></div>

<!-- ══════ REVIEW END ══════ -->
<div class="ov" id="ov-review-end"><div class="md">

/* ════ ENGINE ════ */
var E=function(id){return document.getElementById(id)};
var gridEl=E('grid'),comboEl=E('combo-el'),fxC=E('fx'),fxX=fxC.getContext('2d');

/* Save */
var SK='wmatch_v3';
function loadS(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function writeS(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}
function getBest(i){return(loadS()['l'+i])||null}
function saveBest(i,t,m,c){var s=loadS(),p=s['l'+i];if(!p||t<p.t)s['l'+i]={t:t,m:m,c:c};if(!s.mc||i>s.mc)s.mc=i;writeS(s);syncToCloud()}
function maxCleared(){var s=loadS();return s.mc!=null?s.mc:-1}

/* Word mastery storage: {key: "L{lvl}_W{word}", status: "mastered"|"learning"|"new", interval: days, nextReview: timestamp} */
function getWordData(){return loadS().words||{}}
function setWordStatus(key,status,interval){var s=loadS();if(!s.words)s.words={};var now=Date.now();var next=now+(interval||1)*86400000;s.words[key]={st:status,iv:interval||1,nr:next,lr:now};writeS(s);syncToCloud()}
function getAllWords(){
  var all=[];
  LEVELS.forEach(function(lv,li){
    var m={};lv.vocabulary.forEach(function(v){if(!m[v.id])m[v.id]={};m[v.id][v.type]=v.content});
    for(var k in m){var key='L'+li+'_W'+k;var wd=getWordData()[key];all.push({key:key,word:m[k].word,def:m[k].def,level:li,status:wd?wd.st:'new'})}
  });return all;
}
function getDueWords(){
  var now=Date.now(),due=[];var wd=getWordData();
  getAllWords().forEach(function(w){var d=wd[w.key];if(d&&d.st!=='mastered'&&d.nr<=now)due.push(w);else if(d&&d.st==='learning'&&d.nr<=now)due.push(w)});
  return due;
}
function getReviewCount(){var wd=getWordData();var count=0;var now=Date.now();for(var k in wd){if(wd[k].st!=='mastered'&&wd[k].nr<=now)count++}return count}

function getMasteryPct(){var all=getAllWords();if(all.length===0)return 0;var m=all.filter(function(w){return w.status==='mastered'}).length;return Math.round(m/all.length*100)}
function getRank(){var pct=getMasteryPct();var r=RANKS[0];for(var i=RANKS.length-1;i>=0;i--){if(pct>=RANKS[i].min){r=RANKS[i];break}}return r}
function getNextRank(){var pct=getMasteryPct();for(var i=0;i<RANKS.length;i++){if(pct<RANKS[i].min)return RANKS[i]}return null}

/* Validate */
function validate(lv,i){var v=lv.vocabulary;if(!v||!Array.isArray(v))return'Bad data';if(v.length%2!==0||v.length<4)return'Bad pairs';var c={};v.forEach(function(x){c[x.id]=(c[x.id]||0)+1});for(var id in c)if(c[id]!==2)return'id='+id+' bad';return null}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function calcCols(n){return n<=16?4:5}
function getPairs(vocab){var m={};vocab.forEach(function(v){if(!m[v.id])m[v.id]={};m[v.id][v.type]=v.content;m[v.id].lid=v.id});return Object.keys(m).map(function(k){return m[k]})}

/* Particles */
var particles=[];var PC=['#F8B195','#F67280','#C06C84','#6C5B7B','#A8E6CF','#DCEDC1','#FFD93D','#FF6B6B'];
function resizeFx(){fxC.width=innerWidth;fxC.height=innerHeight}addEventListener('resize',resizeFx);resizeFx();
function spawnP(x,y,n){n=n||12;for(var i=0;i<n;i++){var a=Math.PI*2*i/n+Math.random()*.5;particles.push({x:x,y:y,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4)-2,sz:3+Math.random()*5,col:PC[~~(Math.random()*PC.length)],life:1,dec:.015+Math.random()*.02,sh:['c','s','h'][~~(Math.random()*3)],rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.2})}}
function drawP(){fxX.clearRect(0,0,fxC.width,fxC.height);particles=particles.filter(function(p){return p.life>0});particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.dec;p.rot+=p.rs;fxX.save();fxX.translate(p.x,p.y);fxX.rotate(p.rot);fxX.globalAlpha=p.life;fxX.fillStyle=p.col;if(p.sh==='s'){fxX.beginPath();for(var i=0;i<5;i++){var a1=i*4*Math.PI/5-Math.PI/2;fxX.lineTo(Math.cos(a1)*p.sz,Math.sin(a1)*p.sz);var a2=a1+2*Math.PI/5;fxX.lineTo(Math.cos((a1+a2)/2)*p.sz*.4,Math.sin((a1+a2)/2)*p.sz*.4)}fxX.closePath();fxX.fill()}else if(p.sh==='h'){var s=p.sz*.6;fxX.beginPath();fxX.moveTo(0,s*.4);fxX.bezierCurveTo(-s,-s*.3,-s*.5,-s,0,-s*.4);fxX.bezierCurveTo(s*.5,-s,s,-s*.3,0,s*.4);fxX.fill()}else{fxX.beginPath();fxX.arc(0,0,p.sz,0,Math.PI*2);fxX.fill()}fxX.restore()});fxX.globalAlpha=1;requestAnimationFrame(drawP)}drawP();
function floatTxt(t,c,x,y){var el=document.createElement('div');el.className='bf';el.textContent=t;el.style.cssText='left:'+x+'px;top:'+y+'px;color:'+c;document.body.appendChild(el);requestAnimationFrame(function(){el.classList.add('show')});setTimeout(function(){el.remove()},1000)}

/* ════ AUTH ════ */
E('auth-login').addEventListener('click',async function(){
  var email=E('auth-email').value.trim(),pass=E('auth-pass').value;
  E('auth-err').textContent='';
  if(!email){E('auth-err').textContent='\u8BF7\u8F93\u5165\u90AE\u7BB1';return}
  if(pass.length<6){E('auth-err').textContent='\u5BC6\u7801\u81F3\u5C116\u4F4D';return}
  if(!sb){E('auth-err').textContent='Supabase \u672A\u914D\u7F6E\uFF0C\u8BF7\u5148\u4F53\u9A8C';return}
  try{
    var res=await sb.auth.signInWithPassword({email:email,password:pass});
    if(res.error&&res.error.message.indexOf('Invalid')>=0){
      var res2=await sb.auth.signUp({email:email,password:pass});
      if(res2.error){E('auth-err').textContent=res2.error.message;return}
      currentUser={email:email,id:res2.data.user.id};
    }else if(res.error){E('auth-err').textContent=res.error.message;return}
    else{currentUser={email:email,id:res.data.user.id}}
    afterLogin();
  }catch(e){E('auth-err').textContent='\u7F51\u7EDC\u9519\u8BEF'}
});
E('auth-skip').addEventListener('click',function(){currentUser={email:'guest',id:'local'};afterLogin()});
E('ub-logout').addEventListener('click',function(){if(sb)sb.auth.signOut();currentUser=null;E('user-bar').classList.remove('vis');showOv('ov-auth')});

function afterLogin(){updateUserBar();showMenu()}
function updateUserBar(){
  if(!currentUser)return;
  var r=getRank();
  E('ub-rank').textContent=r.emoji;E('ub-name').textContent=currentUser.email==='guest'?'\u8BBF\u5BA2\u6A21\u5F0F':currentUser.email.split('@')[0];
  E('ub-rlabel').textContent=r.name+' \xb7 '+getMasteryPct()+'%';
  E('user-bar').classList.add('vis');
}

/* Cloud sync (if Supabase configured) */
async function syncToCloud(){
  if(!sb||!currentUser||currentUser.id==='local')return;
  try{await sb.from('progress').upsert({user_id:currentUser.id,data:JSON.stringify(loadS()),updated_at:new Date().toISOString()},{onConflict:'user_id'})}catch(e){}
}
async function syncFromCloud(){
  if(!sb||!currentUser||currentUser.id==='local')return;
  try{var res=await sb.from('progress').select('data').eq('user_id',currentUser.id).single();if(res.data&&res.data.data){var cloud=JSON.parse(res.data.data);var local=loadS();if(Object.keys(cloud).length>Object.keys(local).length){writeS(cloud)}}}catch(e){}
}

  E('rc-bar').style.width=pct+'%';

  var mc=maxCleared(),list=E('lvl-list');list.innerHTML='';
  LEVELS.forEach(function(lv,i){
    var btn=document.createElement('button');btn.className='lvl-btn';
    var pairs=lv.vocabulary.length/2,best=getBest(i),unlocked=i===0||i<=mc+1;
    if(!unlocked)btn.classList.add('locked');
    var bH='';if(best)bH='<div class="lvl-best">\u2694\ufe0f '+best.t+'s \xb7 '+best.m+'\u6b21</div>';
    btn.innerHTML='<div class="lvl-num">'+(i+1)+'</div><div style="flex:1"><div class="lvl-name">'+lv.title+'</div><div class="lvl-meta">'+pairs+'\u7ec4 \xb7 '+lv.timer+'s</div>'+bH+'</div>';
    if(unlocked)btn.addEventListener('click',function(){openMode(i)});
    list.appendChild(btn);
  });
  showOv('ov-menu');
}

}

/* Full mastery popup */
var masteryFilter='all';
function showMastery(){
  masteryFilter='all';renderMasteryPopup();
  E('ov-mastery').style.display='flex';E('ov-mastery').classList.add('vis');
}
function filterMastery(f,btn){masteryFilter=f;if(btn){btn.parentElement.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});btn.classList.add('active')}renderMasteryPopup()}
function renderMasteryPopup(){
  var all=getAllWords(),m=all.filter(function(w){return w.status==='mastered'}).length,l=all.filter(function(w){return w.status==='learning'}).length;
  E('mp-stats').innerHTML='<div class="mstat"><div class="mstat-num" style="color:#3BA776">'+m+'</div><div class="mstat-lab">\u5DF2\u638C\u63E1</div></div><div class="mstat"><div class="mstat-num" style="color:#C4960C">'+l+'</div><div class="mstat-lab">\u5B66\u4E60\u4E2D</div></div><div class="mstat"><div class="mstat-num">'+all.length+'</div><div class="mstat-lab">\u603B\u8BCD\u6C47</div></div>';
  var filtered=masteryFilter==='all'?all:all.filter(function(w){return w.status===(masteryFilter==='new-word'?'new':masteryFilter)});
  var g=E('mp-grid');g.innerHTML='';
  filtered.forEach(function(w){g.innerHTML+='<div class="word-chip '+(w.status==='new'?'new-word':w.status)+'"><div class="wc-en">'+w.word+'</div><div class="wc-zh">'+w.def+'</div></div>'});
}

/* ════ MODE SELECT ════ */
function openMode(idx){
  currentLvl=idx;var lv=LEVELS[idx];
  E('mode-title').textContent='Stage '+(idx+1)+': '+lv.title;
  E('mode-sub').textContent=(lv.vocabulary.length/2)+'\u7ec4 \xb7 '+lv.timer+'\u79d2';
  var rc=getReviewCount();E('rv-badge').textContent=rc;E('rv-badge').style.display=rc>0?'inline-block':'none';
  E('mc-study').onclick=function(){startStudy(idx)};
  E('mc-battle').onclick=function(){startBattle(idx)};
  E('mc-review').onclick=function(){startReview(idx)};
  showOv('ov-mode');
}

/* ════ STUDY MODE ════ */
var S={pairs:[],idx:0,ratings:{},lvl:0};
function startStudy(li,subset){
  var lv=LEVELS[li];if(validate(lv,li))return;
  currentLvl=li;S.pairs=subset||shuffle(getPairs(lv.vocabulary));S.idx=0;S.ratings={hard:[],ok:[],easy:[]};S.lvl=li;
  hideAll();E('study-area').classList.add('active');E('user-bar').classList.add('vis');
  E('st-badge').textContent=subset?'\u590D\u4E60\u4E0D\u719F\u7684':'\u5B66\u4E60\u6A21\u5F0F';E('st-title').textContent='Stage '+(li+1)+': '+lv.title;showSFC();
}
function showSFC(){
  if(S.idx>=S.pairs.length){finishStudy();return}
  var p=S.pairs[S.idx];E('fc-word').textContent=p.word;E('fc-def').textContent=p.def;E('fc-word2').textContent=p.word;
  E('st-prog').textContent=(S.idx+1)+' / '+S.pairs.length;E('st-pbar').style.width=(S.idx/S.pairs.length*100)+'%';
  E('fc-box').classList.remove('flipped');E('fc-actions').classList.add('hidden');
}
E('fc-box').addEventListener('click',function(){if(!E('fc-box').classList.contains('flipped')){E('fc-box').classList.add('flipped');E('fc-actions').classList.remove('hidden')}});
document.querySelectorAll('#fc-actions .fc-rb').forEach(function(btn){btn.addEventListener('click',function(){
  var r=btn.dataset.rate,p=S.pairs[S.idx],key='L'+S.lvl+'_W'+p.lid;
  S.ratings[r].push(p);
  if(r==='easy'){setWordStatus(key,'mastered',30);var rc=btn.getBoundingClientRect();spawnP(rc.left+rc.width/2,rc.top,8)}
  else if(r==='ok'){setWordStatus(key,'learning',1)}
  else{setWordStatus(key,'learning',0.15)}
  S.idx++;showSFC();
})});
function finishStudy(){
  E('study-area').classList.remove('active');
  var h=S.ratings.hard.length,o=S.ratings.ok.length,e=S.ratings.easy.length;
  E('se-hard').textContent=h;E('se-ok').textContent=o;E('se-easy').textContent=e;
  E('se-sub').textContent=h===0&&o===0?'\u5168\u90E8\u638C\u63E1\uff01':'\u6709'+(h+o)+'\u4E2A\u9700\u8981\u5DE9\u56FA';
  E('se-battle').onclick=function(){startBattle(currentLvl)};
  var hw=S.ratings.hard.concat(S.ratings.ok);
  if(hw.length>0){E('se-restudy').style.display='inline-block';E('se-restudy').onclick=function(){startStudy(currentLvl,hw)}}else E('se-restudy').style.display='none';
  updateUserBar();showOv('ov-study-end');
}

/* ════ REVIEW MODE ════ */
var R={words:[],idx:0,ratings:{}};
function startReview(li){
  var due=getDueWords().filter(function(w){return w.level===li});
  if(due.length===0){var lv=LEVELS[li];var allP=getPairs(lv.vocabulary);due=allP.map(function(p){return{key:'L'+li+'_W'+p.lid,word:p.word,def:p.def,level:li,status:'new'}})}
  R.words=shuffle(due);R.idx=0;R.ratings={hard:[],ok:[],easy:[]};
  hideAll();E('review-area').classList.add('active');E('user-bar').classList.add('vis');
  E('rv-title').textContent='Stage '+(li+1)+' \u590D\u4E60';showRFC();
}
function showRFC(){
  if(R.idx>=R.words.length){finishReview();return}
  var w=R.words[R.idx];E('rv-fc-word').textContent=w.word;E('rv-fc-def').textContent=w.def;E('rv-fc-word2').textContent=w.word;
  E('rv-prog').textContent=(R.idx+1)+' / '+R.words.length;E('rv-pbar').style.width=(R.idx/R.words.length*100)+'%';
  E('rv-fc-box').classList.remove('flipped');E('rv-fc-actions').classList.add('hidden');
}
E('rv-fc-box').addEventListener('click',function(){if(!E('rv-fc-box').classList.contains('flipped')){E('rv-fc-box').classList.add('flipped');E('rv-fc-actions').classList.remove('hidden')}});
document.querySelectorAll('#rv-fc-actions .fc-rb').forEach(function(btn){btn.addEventListener('click',function(){
  var r=btn.dataset.rate,w=R.words[R.idx];R.ratings[r].push(w);
  var wd=getWordData()[w.key],iv=wd?wd.iv:1;
  if(r==='easy'){setWordStatus(w.key,'mastered',Math.max(iv*2.5,7));var rc=btn.getBoundingClientRect();spawnP(rc.left+rc.width/2,rc.top,8)}
  else if(r==='ok'){setWordStatus(w.key,'learning',Math.max(iv*1.2,1))}
  else{setWordStatus(w.key,'learning',0.15)}
  R.idx++;showRFC();
})});
function finishReview(){
  E('review-area').classList.remove('active');
  E('re-hard').textContent=R.ratings.hard.length;E('re-ok').textContent=R.ratings.ok.length;E('re-easy').textContent=R.ratings.easy.length;
  E('re-sub').textContent=R.ratings.hard.length===0?'\u592A\u68D2\u4E86\uff01\u8FDB\u6B65\u660E\u663E':'\u7EE7\u7EED\u52A0\u6CB9\uff0C\u660E\u5929\u518D\u6765\u590D\u4E60';
  updateUserBar();showOv('ov-review-end');
}

/* ════ BATTLE MODE ════ */
var G={first:null,second:null,lock:false,matched:0,total:0,moves:0,combo:0,maxCombo:0,timeLeft:0,timer:null,lvlIdx:0,cb:0};
function resetG(){return{first:null,second:null,lock:false,matched:0,total:0,moves:0,combo:0,maxCombo:0,timeLeft:0,timer:null,lvlIdx:0,cb:0}}
function startBattle(idx){
  var lv=LEVELS[idx];if(validate(lv,idx))return;
  currentLvl=idx;G=resetG();G.lvlIdx=idx;G.total=lv.vocabulary.length/2;G.timeLeft=lv.timer;G.cb=lv.comboBonus||0;
  hideAll();E('game-area').classList.add('active');E('user-bar').classList.add('vis');
  E('g-badge').textContent='STAGE '+(idx+1);E('g-title').textContent=lv.title;updateHUD();
  gridEl.style.gridTemplateColumns='repeat('+calcCols(lv.vocabulary.length)+',1fr)';gridEl.innerHTML='';
  shuffle(lv.vocabulary).forEach(function(item,i){
    var s=document.createElement('div');s.className='cs';s.dataset.pid=item.id;s.dataset.tp=item.type;s.style.animationDelay=i*.04+'s';
    s.innerHTML='<div class="ci"><div class="cf cf-b"></div><div class="cf cf-f"><div class="ct-l">'+(item.type==='word'?'EN':'\u4E2D')+'</div><div class="ct-t">'+item.content+'</div></div></div>';
    s.addEventListener('click',function(){onFlip(s)});gridEl.appendChild(s);
  });
  clearInterval(G.timer);G.timer=setInterval(function(){G.timeLeft--;updateHUD();if(G.timeLeft<=0){G.lock=true;G.first=G.second=null;endBattle(false)}},1000);
}
function onFlip(s){if(G.lock||s===G.first||s.classList.contains('done'))return;s.classList.add('flipped');if(!G.first){G.first=s;return}G.second=s;G.moves++;G.lock=true;updateHUD();var i1=G.first.dataset.pid,i2=G.second.dataset.pid,t1=G.first.dataset.tp,t2=G.second.dataset.tp;(i1===i2&&t1!==t2)?onMatch():onMiss()}
function onMatch(){G.combo++;if(G.combo>G.maxCombo)G.maxCombo=G.combo;G.matched++;[G.first,G.second].forEach(function(s){var r=s.getBoundingClientRect();spawnP(r.left+r.width/2,r.top+r.height/2,14)});if(G.combo>=2&&G.cb>0){G.timeLeft+=G.cb;var r=G.second.getBoundingClientRect();floatTxt('+'+G.cb+'s','#3BA776',r.left+r.width/2,r.top)}if(G.combo>=2)showCombo(G.combo);updateHUD();setTimeout(function(){G.first.classList.add('match-go','done');G.second.classList.add('match-go','done');resetB();if(G.matched===G.total)setTimeout(function(){endBattle(true)},400)},350)}
function onMiss(){G.combo=0;updateHUD();G.first.classList.add('shake-go');G.second.classList.add('shake-go');setTimeout(function(){G.first.classList.remove('flipped','shake-go');G.second.classList.remove('flipped','shake-go');resetB()},650)}
function resetB(){G.first=G.second=null;G.lock=false}
function updateHUD(){E('d-time').textContent=G.timeLeft+'s';E('d-moves').textContent=G.moves;E('d-combo').textContent=G.combo;E('pbar').style.width=(G.total===0?0:Math.round(G.matched/G.total*100))+'%';if(G.timeLeft<=15)E('si-time').classList.add('warn');else E('si-time').classList.remove('warn')}
function endBattle(won){
  clearInterval(G.timer);G.lock=true;G.first=G.second=null;
  var lv=LEVELS[G.lvlIdx],elapsed=lv.timer-G.timeLeft,isNew=false;
  if(won){var prev=getBest(G.lvlIdx);if(!prev||elapsed<prev.t)isNew=true;saveBest(G.lvlIdx,elapsed,G.moves,G.maxCombo);for(var i=0;i<5;i++)setTimeout(function(){spawnP(Math.random()*innerWidth,Math.random()*innerHeight*.5,20)},i*180)}
  E('e-emoji').textContent=won?'\ud83c\udfc6':'\u23f0';
  E('e-title').textContent=won?['\u592a\u795e\u4e86\uff01','\u5b8c\u7f8e\uff01','\u4f60\u592a\u5f3a\u4e86\uff01','\u65e0\u654c\uff01'][~~(Math.random()*4)]:'\u65f6\u95f4\u5230\uff01';
  E('e-sub').textContent=won?'\u5168\u90e8\u914d\u5bf9\u6210\u529f\uff01':'\u518d\u6765\u4e00\u6b21\uff01';
  E('e-time').textContent=won?elapsed:'-';E('e-moves').textContent=G.moves;E('e-combo').textContent=G.maxCombo;
  E('e-best').textContent=won&&isNew?'\ud83c\udf1f \u65b0\u7eaa\u5f55\uff01':won?'\u6700\u4f73: '+getBest(G.lvlIdx).t+'s':'';
  var a=E('e-action');
  if(won&&G.lvlIdx<LEVELS.length-1){a.textContent='\u4e0b\u4e00\u5173 \u2192';a.onclick=function(){openMode(G.lvlIdx+1)};a.style.display='inline-block'}
  else if(won){a.textContent='\ud83c\udf89 \u5168\u90e8\u901a\u5173';a.onclick=function(){showMenu()};a.style.display='inline-block'}
  else a.style.display='none';
  E('e-retry').onclick=function(){startBattle(G.lvlIdx)};
  E('game-area').classList.remove('active');updateUserBar();showOv('ov-end');
}
