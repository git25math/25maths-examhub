  <text x="450" y="908" text-anchor="middle" font-size="11" font-weight="700" fill="#5248C9">6 CORE OBJECTS</text>
  <text x="130" y="930" text-anchor="middle" font-size="10" font-weight="600" fill="#1E1B4B">Learning Unit</text>
  <text x="130" y="944" text-anchor="middle" font-size="9" fill="#6B7280">vocab / kp / question</text>
  <text x="270" y="930" text-anchor="middle" font-size="10" font-weight="600" fill="#1E1B4B">Learning Graph</text>
  <text x="270" y="944" text-anchor="middle" font-size="9" fill="#6B7280">cross-dimension links</text>
  <text x="410" y="930" text-anchor="middle" font-size="10" font-weight="600" fill="#1E1B4B">Recovery Session</text>
  <text x="410" y="944" text-anchor="middle" font-size="9" fill="#6B7280">chained scan engine</text>
  <text x="550" y="930" text-anchor="middle" font-size="10" font-weight="600" fill="#1E1B4B">Recovery Pack</text>
  <text x="550" y="944" text-anchor="middle" font-size="9" fill="#6B7280">contextual repair</text>
  <text x="690" y="930" text-anchor="middle" font-size="10" font-weight="600" fill="#1E1B4B">Repair Sheet</text>
  <text x="690" y="944" text-anchor="middle" font-size="9" fill="#6B7280">A4 printable</text>
  <text x="800" y="930" text-anchor="middle" font-size="10" font-weight="600" fill="#1E1B4B">Section Health</text>
  <text x="800" y="944" text-anchor="middle" font-size="9" fill="#6B7280">0-100 composite</text>
</svg>
