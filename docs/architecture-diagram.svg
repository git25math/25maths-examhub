    <text x="200" y="652" font-size="14" fill="#fff" opacity="0.6">></text>
    <rect x="215" y="636" width="110" height="24" rx="5" fill="#fff" fill-opacity="0.2"/>
    <text x="270" y="652" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">KP Scan</text>
    <text x="335" y="652" font-size="14" fill="#fff" opacity="0.6">></text>
    <rect x="350" y="636" width="110" height="24" rx="5" fill="#fff" fill-opacity="0.2"/>
    <text x="405" y="652" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">PP Scan</text>
    <text x="470" y="652" font-size="14" fill="#fff" opacity="0.6">></text>
    <rect x="485" y="636" width="100" height="24" rx="5" fill="#fff" fill-opacity="0.3"/>
    <text x="535" y="652" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Result</text>
    <text x="595" y="652" font-size="14" fill="#fff" opacity="0.6">></text>
    <rect x="610" y="636" width="110" height="24" rx="5" fill="#fff" fill-opacity="0.3"/>
    <text x="665" y="652" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Next / Exit</text>
    <text x="760" y="606" text-anchor="end" font-size="11" fill="#fff" opacity="0.8">recovery-session.js</text>
  </g>

  <!-- Arrow -->
  <path d="M450 666 L450 682" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Layer 7: Repair -->
  <g filter="url(#shadow)">
    <rect x="60" y="684" width="780" height="88" rx="10" fill="url(#gRed)"/>
    <text x="80" y="710" font-size="10" font-weight="700" fill="#fff" opacity="0.7">LAYER 7</text>
    <text x="80" y="730" font-size="16" font-weight="700" fill="#fff">Repair Layer</text>
    <!-- Recovery Pack items -->
    <rect x="80" y="742" width="150" height="24" rx="5" fill="#fff" fill-opacity="0.2"/>
    <text x="155" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Recovery Pack</text>
    <rect x="240" y="742" width="150" height="24" rx="5" fill="#fff" fill-opacity="0.2"/>
    <text x="315" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Weak Vocab + KPs</text>
    <rect x="400" y="742" width="150" height="24" rx="5" fill="#fff" fill-opacity="0.2"/>
    <text x="475" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Similar Questions</text>
    <rect x="560" y="742" width="170" height="24" rx="5" fill="#fff" fill-opacity="0.2"/>
    <text x="645" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Print Repair Sheet (A4)</text>
    <text x="760" y="710" text-anchor="end" font-size="11" fill="#fff" opacity="0.8">worksheet.js</text>
  </g>

  <!-- Arrow -->
  <path d="M450 772 L450 788" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Layer 8: Feedback -->
  <g filter="url(#shadow)">
    <rect x="60" y="790" width="780" height="72" rx="10" fill="url(#gSlate)"/>
    <text x="80" y="816" font-size="10" font-weight="700" fill="#fff" opacity="0.7">LAYER 8</text>
    <text x="80" y="836" font-size="16" font-weight="700" fill="#fff">Feedback Loop</text>
    <text x="80" y="852" font-size="11" fill="#fff" opacity="0.85">Re-attempt -> Mastery Update -> Section Health recalc -> Plan refreshed</text>
  </g>

  <!-- Feedback loop arrow (back to Layer 4) -->
  <path d="M840 826 L860 826 L860 420 L840 420" stroke="#818CF8" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <defs><marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#818CF8"/></marker></defs>
  <text x="866" y="630" font-size="9" font-weight="600" fill="#818CF8" transform="rotate(-90, 866, 630)">Feedback Loop</text>

  <!-- Footer: Core Objects -->
