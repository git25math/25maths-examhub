<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif">
  <defs>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#5248C9"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="gIndigo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="gSlate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="980" fill="#F8F7FF" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1E1B4B">25Maths Learning Engine</text>
  <text x="450" y="64" text-anchor="middle" font-size="12" fill="#6B7280">Curriculum-Aligned Maths Recovery &amp; Mastery System  |  v3.4.1</text>

  <!-- Layer 1: Curriculum -->
  <g filter="url(#shadow)">
    <rect x="60" y="88" width="780" height="72" rx="10" fill="url(#gPurple)"/>
    <text x="80" y="114" font-size="10" font-weight="700" fill="#fff" opacity="0.7">LAYER 1</text>
    <text x="80" y="134" font-size="16" font-weight="700" fill="#fff">Curriculum Layer</text>
    <text x="80" y="150" font-size="11" fill="#fff" opacity="0.85">Exam boards, year groups, chapters, sections</text>
    <text x="760" y="120" text-anchor="end" font-size="11" fill="#fff" opacity="0.8">CIE 0580 (72 sections)</text>
    <text x="760" y="136" text-anchor="end" font-size="11" fill="#fff" opacity="0.8">Edexcel 4MA1 (39 sections)</text>
    <text x="760" y="152" text-anchor="end" font-size="11" fill="#fff" opacity="0.8">Harrow Y7-Y11 (164 levels)</text>
  </g>

  <!-- Arrow -->
  <path d="M450 160 L450 176" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#CBD5E1"/></marker></defs>

  <!-- Layer 2: Content -->
  <g filter="url(#shadow)">
    <rect x="60" y="178" width="780" height="88" rx="10" fill="#fff" stroke="#E5E7EB" stroke-width="1"/>
    <text x="80" y="204" font-size="10" font-weight="700" fill="#6C63FF" opacity="0.8">LAYER 2</text>
    <text x="80" y="224" font-size="16" font-weight="700" fill="#1E1B4B">Content Layer</text>
    <!-- Content boxes -->
    <rect x="80" y="236" width="130" height="24" rx="5" fill="#EEF2FF"/>
    <text x="145" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#4F46E5">2,200 Vocabulary</text>
    <rect x="220" y="236" width="130" height="24" rx="5" fill="#EEF2FF"/>
    <text x="285" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#4F46E5">111 KPs</text>
    <rect x="360" y="236" width="130" height="24" rx="5" fill="#EEF2FF"/>
    <text x="425" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#4F46E5">3,578 MCQs</text>
    <rect x="500" y="236" width="160" height="24" rx="5" fill="#EEF2FF"/>
    <text x="580" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#4F46E5">5,965 Past Paper Qs</text>
    <rect x="670" y="236" width="130" height="24" rx="5" fill="#EEF2FF"/>
    <text x="735" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#4F46E5">291 Examples</text>
  </g>

  <!-- Arrow -->
  <path d="M450 266 L450 282" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Layer 3: Relationship -->
  <g filter="url(#shadow)">
    <rect x="60" y="284" width="780" height="72" rx="10" fill="url(#gBlue)"/>
    <text x="80" y="310" font-size="10" font-weight="700" fill="#fff" opacity="0.7">LAYER 3</text>
    <text x="80" y="330" font-size="16" font-weight="700" fill="#fff">Relationship Layer — Learning Graph</text>
    <text x="80" y="346" font-size="11" fill="#fff" opacity="0.85">Vocab &lt;-&gt; Section Code &lt;-&gt; KP &lt;-&gt; Questions  |  6 query functions</text>
    <text x="760" y="330" text-anchor="end" font-size="11" fill="#fff" opacity="0.8">learning-graph.js</text>
  </g>

  <!-- Arrow -->
  <path d="M450 356 L450 372" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Layer 4: State -->
  <g filter="url(#shadow)">
    <rect x="60" y="374" width="780" height="88" rx="10" fill="#fff" stroke="#E5E7EB" stroke-width="1"/>
    <text x="80" y="400" font-size="10" font-weight="700" fill="#22C55E" opacity="0.8">LAYER 4</text>
    <text x="80" y="420" font-size="16" font-weight="700" fill="#1E1B4B">State Layer — FLM State Machine</text>
    <!-- FLM states -->
