    <text x="115" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#9CA3AF">new</text>
    <text x="160" y="448" font-size="12" fill="#CBD5E1">-></text>
    <rect x="175" y="432" width="80" height="24" rx="5" fill="#FEE2E2"/>
    <text x="215" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444">learning</text>
    <text x="265" y="448" font-size="12" fill="#CBD5E1">-></text>
    <rect x="280" y="432" width="80" height="24" rx="5" fill="#FEF3C7"/>
    <text x="320" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#D97706">uncertain</text>
    <text x="370" y="448" font-size="12" fill="#CBD5E1">-></text>
    <rect x="385" y="432" width="80" height="24" rx="5" fill="#DCFCE7"/>
    <text x="425" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#16A34A">mastered</text>
    <text x="475" y="448" font-size="12" fill="#CBD5E1">-></text>
    <rect x="490" y="432" width="60" height="24" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="520" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#D97706">decay</text>
    <!-- Right side info -->
