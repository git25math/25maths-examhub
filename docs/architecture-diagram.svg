  </g>

  <!-- Arrow (special: v3.5 label) -->
  <path d="M450 552 L450 576" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="370" y="558" width="160" height="16" rx="4" fill="#EEF2FF" stroke="#818CF8" stroke-width="1"/>
  <text x="450" y="570" text-anchor="middle" font-size="9" font-weight="700" fill="#6366F1">v3.5 Smart Ordering</text>

